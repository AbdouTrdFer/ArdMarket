<div
  class="mx-auto w-full max-w-lg rounded-4xl border border-line bg-surface p-5 text-center shadow-card sm:p-8"
>
  <div class="mx-auto flex w-full max-w-md flex-col items-center">
    <!-- ENIAD Logo -->
    <div class="relative h-20 w-64 sm:h-24 sm:w-80">
      <img ngSrc="assets/logo-ENIAD.png" fill alt="ENIAD" priority class="object-contain" />
    </div>

    <!-- App Logo -->
    <div class="relative h-24 w-24 sm:h-40 sm:w-40">
      <img
        ngSrc="assets/logo-app.png"
        fill
        alt="Attendance Platform"
        priority
        class="object-contain"
      />
    </div>

    <h2 class="text-2xl font-semibold tracking-tight text-principalText sm:text-3xl">
      Plateforme de Présence
    </h2>

    <p class="mt-3 text-sm leading-6 text-secondaryText sm:text-base">
      Connectez-vous pour accéder à votre compte
    </p>

    <div class="mt-6 w-full">
      <app-button
        label="Se connecter avec Google"
        icon="fab fa-google"
        variant="primary"
        [loading]="isLoading()"
        (clicked)="signInWithGoogle()"
      ></app-button>
    </div>

    @if (isLoading()) {
      <p class="mt-3 text-sm text-muted animate-pulse">Connexion en cours...</p>
    }

    @if (authError()) {
      <div class="mt-4 p-3 bg-red-50 border border-red-200 rounded-lg" role="alert">
        <p class="text-sm text-red-800 font-medium">{{ authError() }}</p>
      </div>
    }
    <p class="mt-4 text-xs leading-6 text-secondaryText sm:text-sm">
      Utilisez votre adresse e-mail
      <span class="font-semibold text-principalText">@ump.ac.ma</span>
    </p>

    <div class="mt-6 flex flex-wrap justify-center gap-x-4 gap-y-2 text-xs text-muted sm:text-sm">
      <span>Politique de confidentialité</span>
      <span>Centre d'aide</span>
      <span>&copy; ENIAD 2026</span>
    </div>
  </div>
</div>
