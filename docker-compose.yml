services:
  # ===================== Traefik (API Gateway) =======================
  traefik:
    image: traefik:latest
    container_name: traefik
    ports:
      - "80:80" # traffic
      - "9000:8080" # dashboard
    volumes:
      # Docker socket — only needed in prod when using Docker provider
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # Mount your config files into the container
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/routes.dev.yml:/etc/traefik/routes.dev.yml:ro

  # ===================== Redis =======================
  redis:
    image: redis:alpine
    container_name: redis
    ports:
      - "6379:6379"

  # ===================== Databases =======================
  user-db:
    image: postgres:15-alpine
    container_name: user-db
    ports:
      - 5433:5432
    environment:
      POSTGRES_DB: users_db
    env_file:
      - .env
    volumes:
      - users_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 20

  attendance-db:
    image: postgres:15-alpine
    container_name: attendance-db
    ports:
      - 5434:5432
    environment:
      POSTGRES_DB: attendance_db
    env_file:
      - .env
    volumes:
      - attendance_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 20

